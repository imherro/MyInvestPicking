<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyInvestPicking</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #5f6b7a;
        --line: #d8dee8;
        --accent: #0f766e;
        --buy: #047857;
        --hold: #92400e;
        --no-trade: #991b1b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(1360px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .status {
        color: var(--muted);
        font-size: 14px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .toolbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--line);
      }

      .toolbar h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
        letter-spacing: 0;
      }

      #summary {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
        max-width: 760px;
      }

      .summary-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 26px;
        padding: 0 9px;
        border: 1px solid #dbe4e1;
        border-radius: 6px;
        background: #f9fbfa;
        color: var(--text);
        cursor: help;
        font-size: 12px;
        font-weight: 650;
        white-space: nowrap;
      }

      .summary-pill span {
        color: var(--muted);
        font-weight: 600;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        background: #e8f3f1;
        color: var(--accent);
        font-size: 13px;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      table {
        width: 100%;
        min-width: 920px;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        padding: 13px 16px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        white-space: nowrap;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      td {
        font-size: 14px;
      }

      .compact-cell {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .score-cell {
        cursor: help;
      }

      .score-cell strong {
        display: block;
        font-weight: 700;
      }

      .score-cell span,
      .confidence span:first-child {
        color: var(--muted);
        font-size: 12px;
      }

      .signal {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 0 8px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 700;
      }

      .signal-buy {
        background: #dff5ea;
        color: var(--buy);
      }

      .signal-hold {
        background: #fff1d6;
        color: var(--hold);
      }

      .signal-no-trade {
        background: #fde2e2;
        color: var(--no-trade);
      }

      .confidence {
        display: grid;
        gap: 5px;
        min-width: 110px;
      }

      .confidence-track {
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: #e8edf5;
      }

      .confidence-fill {
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
      }

      .shadow-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 0.9fr);
        gap: 18px;
        padding: 18px 20px 20px;
      }

      .shadow-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      .chart {
        display: block;
        width: 100%;
        height: 220px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfe;
      }

      .chart path,
      .chart polyline {
        fill: none;
        stroke: var(--accent);
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2.5;
      }

      .chart .chart-grid {
        stroke: #dfe5ee;
        stroke-width: 1;
      }

      .history-list {
        display: grid;
        gap: 8px;
        max-height: 300px;
        overflow: auto;
      }

      .history-item {
        display: grid;
        grid-template-columns: 88px 1fr auto;
        align-items: center;
        gap: 10px;
        min-height: 42px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfe;
        cursor: help;
      }

      .history-item strong {
        font-size: 13px;
      }

      .history-item span {
        color: var(--muted);
        font-size: 12px;
      }

      .reason {
        cursor: help;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
      }

      td:nth-child(1),
      th:nth-child(1) {
        width: 112px;
      }

      td:nth-child(2),
      th:nth-child(2) {
        width: 150px;
      }

      td:nth-child(3),
      th:nth-child(3) {
        width: 92px;
      }

      td:nth-child(4),
      th:nth-child(4) {
        width: 96px;
      }

      td:nth-child(5),
      th:nth-child(5) {
        width: 104px;
      }

      td:nth-child(6),
      th:nth-child(6) {
        width: 128px;
      }

      td:nth-child(8),
      th:nth-child(8) {
        width: 120px;
      }

      td:nth-child(7),
      th:nth-child(7) {
        width: auto;
      }

      .empty,
      .error {
        padding: 32px;
        color: var(--muted);
        text-align: center;
      }

      .error {
        color: #b42318;
      }

      @media (max-width: 640px) {
        .page-header,
        .toolbar {
          align-items: flex-start;
          flex-direction: column;
        }

        #summary {
          justify-content: flex-start;
        }

        .shadow-grid {
          grid-template-columns: 1fr;
          padding: 14px 14px 16px;
        }

        main {
          width: min(100% - 24px, 1040px);
          padding: 24px 0;
        }

        h1 {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <div data-myinvest-header></div>
    <main>
      <header class="page-header">
        <div>
          <h1>MyInvestPicking</h1>
          <div class="status">Next-day heavy-position stock picking workbench</div>
        </div>
        <div class="badge">Port 8019</div>
      </header>

      <div class="stack">
        <section class="panel" aria-labelledby="top-picks-title">
          <div class="toolbar">
            <h2 id="top-picks-title">Today&apos;s Top Picks</h2>
            <div class="status" id="summary">Loading /api/picks</div>
          </div>
          <div class="table-wrap">
            <table aria-label="Stock picks">
              <thead>
                <tr>
                  <th>Code</th>
                  <th>Name</th>
                  <th>Position</th>
                  <th>Final</th>
                  <th>Signal</th>
                  <th>Confidence</th>
                  <th>Reason</th>
                  <th>Industry</th>
                </tr>
              </thead>
              <tbody id="picks">
                <tr>
                  <td colspan="8" class="empty">No data yet. Engine not initialized.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="panel" aria-labelledby="shadow-title">
          <div class="toolbar">
            <h2 id="shadow-title">Shadow Portfolio</h2>
            <div class="status" id="shadow-status">Waiting for signals</div>
          </div>
          <div class="shadow-grid">
            <div>
              <div class="shadow-summary" id="shadow-summary"></div>
              <svg class="chart" id="shadow-chart" role="img" aria-label="Shadow portfolio NAV curve"></svg>
            </div>
            <div class="history-list" id="rebalance-history">
              <div class="empty">No rebalance history yet.</div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <div data-myinvest-footer></div>
    <script src="https://invest.okbbc.com/header.js" data-target="[data-myinvest-header]" defer></script>
    <script src="https://invest.okbbc.com/footer.js" data-target="[data-myinvest-footer]" defer></script>
    <script>
      const picksBody = document.querySelector("#picks");
      const summary = document.querySelector("#summary");
      const shadowStatus = document.querySelector("#shadow-status");
      const shadowSummary = document.querySelector("#shadow-summary");
      const shadowChart = document.querySelector("#shadow-chart");
      const rebalanceHistory = document.querySelector("#rebalance-history");

      const formatValue = (value) => {
        if (value === null || value === undefined) return "-";
        return Number(value).toFixed(4);
      };

      fetch("/api/picks?shadow_days=0")
        .then((response) => response.json())
        .then((payload) => {
          const data = payload.portfolio || payload.data || [];
          const signals = payload.signals || data;
          const risk = payload.risk || {};
          const regime = payload.market_regime || {};
          const exposure = risk.portfolio_exposure ?? payload.risk_budget?.target_exposure ?? 0;
          const bjExposure = risk.exchange_exposure?.BJ ?? 0;
          const bjCap = risk.max_beijing_weight ?? payload.risk_budget?.max_beijing_weight ?? 0;
          const health = payload.factor_health?.factor_health_score ?? 0;
          const stability = payload.portfolio_stability?.stability_score ?? 0;
          const sharpe = payload.backtest?.metrics?.sharpe ?? 0;
          const signalCounts = payload.signal_summary?.counts || {};
          const buyCount = signalCounts.BUY ?? 0;
          const holdCount = signalCounts.HOLD ?? 0;
          const noTradeCount = signalCounts.NO_TRADE ?? 0;
          summary.title = [
            `BJ exposure ${formatValue(bjExposure)} / ${formatValue(bjCap)}`,
            `factor health ${formatValue(health)}`,
            `portfolio stability ${formatValue(stability)}`,
            `backtest sharpe ${formatValue(sharpe)}`,
            `${signals.length} signals`,
          ].join("\n");
          summary.innerHTML = [
            summaryPill("Date", payload.trading_date || payload.date, summary.title),
            summaryPill("Regime", regime.state || "range", summary.title),
            summaryPill("Exposure", formatValue(exposure), summary.title),
            summaryPill("Signals", `B ${buyCount} / H ${holdCount} / N ${noTradeCount}`, summary.title),
          ].join("");

          if (signals.length === 0) {
            picksBody.innerHTML =
              '<tr><td colspan="8" class="empty">No data yet. Engine not initialized.</td></tr>';
            loadShadowPortfolio();
            return;
          }

          picksBody.innerHTML = signals
            .map(
              (pick) => `
                <tr>
                  <td class="compact-cell" title="${escapeAttr(codeDetail(pick))}">${escapeHtml(pick.code)}</td>
                  <td class="compact-cell" title="${escapeAttr(nameDetail(pick))}">${escapeHtml(pick.name || "-")}</td>
                  <td title="${escapeAttr(weightDetail(pick))}">${formatValue(pick.position_size ?? pick.weight)}</td>
                  <td class="score-cell" title="${escapeAttr(scoreDetail(pick))}">
                    <strong>${formatValue(pick.final_score)}</strong>
                    <span>base ${formatValue(pick.score)}</span>
                  </td>
                  <td title="${escapeAttr(decisionDetail(pick))}"><span class="signal ${signalClass(pick.action)}">${displayAction(pick.action)}</span></td>
                  <td title="${escapeAttr(confidenceDetail(pick))}">
                    <div class="confidence">
                      <span>${formatValue(pick.confidence)}</span>
                      <span class="confidence-track"><span class="confidence-fill" style="width: ${confidenceWidth(pick.confidence)}%"></span></span>
                    </div>
                  </td>
                  <td class="reason" title="${escapeAttr(decisionDetail(pick))}">${escapeHtml(reasonText(pick))}</td>
                  <td class="compact-cell" title="${escapeAttr(industryDetail(pick))}">${escapeHtml(pick.industry || "-")}</td>
                </tr>
              `,
            )
            .join("");
          loadShadowPortfolio();
        })
        .catch(() => {
          summary.textContent = "API unavailable";
          shadowStatus.textContent = "API unavailable";
          picksBody.innerHTML =
            '<tr><td colspan="8" class="error">Failed to load picks.</td></tr>';
        });

      function signalClass(action) {
        if (action === "BUY") return "signal-buy";
        if (action === "HOLD") return "signal-hold";
        return "signal-no-trade";
      }

      function displayAction(action) {
        return action === "NO_TRADE" ? "NO TRADE" : action || "NO TRADE";
      }

      function confidenceWidth(value) {
        if (value === null || value === undefined) return 0;
        return Math.max(0, Math.min(100, Number(value) * 100));
      }

      function reasonText(signal) {
        const reason = signal.reason || {};
        const blocked = reason.tradability_reasons || [];
        if (blocked.length > 0) return blocked.join(", ");
        if (reason.backtest?.block_buy) {
          return `Backtest gate: Sharpe ${formatValue(reason.backtest.sharpe)}`;
        }
        const regime = reason.regime || "-";
        return `${displayAction(reason.decision || signal.action)} in ${regime}`;
      }

      function summaryPill(label, value, detail) {
        return `<span class="summary-pill" title="${escapeAttr(detail)}"><span>${escapeHtml(label)}</span>${escapeHtml(value ?? "-")}</span>`;
      }

      function codeDetail(signal) {
        const metrics = signal.metrics || {};
        return [
          `${signal.code} ${signal.name || ""}`,
          `close ${formatValue(metrics.close)} | pct ${formatValue(metrics.latest_pct_chg)}%`,
          `amount ${formatValue(metrics.latest_amount)} | turnover ${formatValue(metrics.turnover_rate)}%`,
        ].join("\n");
      }

      function nameDetail(signal) {
        return `${signal.name || "-"}\n${signal.code}\nIndustry: ${signal.industry || "-"}`;
      }

      function weightDetail(signal) {
        return [
          `Position size ${formatValue(signal.position_size ?? signal.weight)}`,
          `Original portfolio weight ${formatValue(signal.weight)}`,
        ].join("\n");
      }

      function scoreDetail(signal) {
        const factors = signal.factors || {};
        return [
          `Final ${formatValue(signal.final_score)} | base ${formatValue(signal.score)}`,
          `Momentum ${formatValue(factors.momentum)} | Quality ${formatValue(factors.quality)}`,
          `Value ${formatValue(factors.value)} | Risk ${formatValue(factors.risk)}`,
          `RiskAdj ${formatValue(signal.risk_adjust_factor)} | Regime ${formatValue(signal.regime_multiplier)}`,
          `Health ${formatValue(signal.factor_health_score)} | Exchange ${formatValue(signal.exchange_risk_multiplier)} | Liquidity ${formatValue(signal.liquidity_risk_multiplier)}`,
        ].join("\n");
      }

      function confidenceDetail(signal) {
        const components = signal.signal_confidence?.components || signal.reason?.confidence_components || {};
        return [
          `Confidence ${formatValue(signal.confidence)}`,
          `Factor consistency ${formatValue(components.factor_consistency)}`,
          `Regime alignment ${formatValue(components.regime_alignment)}`,
          `Volume confirmation ${formatValue(components.volume_confirmation)}`,
          `Timeframe alignment ${formatValue(components.timeframe_alignment)}`,
          `Factor health ${formatValue(components.factor_health)}`,
        ].join("\n");
      }

      function decisionDetail(signal) {
        const reason = signal.reason || {};
        const backtest = reason.backtest || {};
        const tradability = signal.tradability || {};
        const tradabilityText = tradability.tradable === false
          ? `Tradability blocked: ${(tradability.reasons || []).join(", ")}`
          : "Tradability ok";
        return [
          `Action ${displayAction(signal.action)}`,
          reasonText(signal),
          tradabilityText,
          `Regime ${reason.regime || "-"}`,
          `Backtest sharpe ${formatValue(backtest.sharpe)} | MDD ${formatValue(backtest.max_drawdown)}`,
          `Backtest block buy ${backtest.block_buy ? "yes" : "no"}`,
        ].join("\n");
      }

      function industryDetail(signal) {
        return `${signal.industry || "-"}\n${signal.code} ${signal.name || ""}`;
      }

      function renderShadowPortfolio(shadow) {
        if (!shadow || shadow.status !== "ok") {
          const reason = shadow?.reason || "No shadow portfolio data";
          shadowStatus.textContent = reason;
          shadowSummary.innerHTML = "";
          shadowChart.innerHTML = "";
          rebalanceHistory.innerHTML = `<div class="empty">${escapeHtml(reason)}</div>`;
          return;
        }

        const info = shadow.summary || {};
        const metrics = shadow.metrics || {};
        const detail = [
          `Mode: ${shadow.assumptions?.rebalance || "daily_new_picks"}`,
          `Position source: ${shadow.assumptions?.position_source || "BUY position_size"}`,
          `Sharpe ${formatValue(metrics.sharpe)} | MDD ${formatValue(metrics.max_drawdown)}`,
          `Turnover ${formatValue(metrics.turnover)}`,
        ].join("\n");
        shadowStatus.textContent = `${info.start_date} to ${info.end_date}`;
        shadowStatus.title = detail;
        shadowSummary.innerHTML = [
          summaryPill("NAV", formatValue(info.end_nav), detail),
          summaryPill("Return", percentValue(info.total_return), detail),
          summaryPill("MDD", percentValue(info.max_drawdown), detail),
          summaryPill("Exposure", formatValue(info.latest_exposure), detail),
          summaryPill("Rebals", info.rebalance_count, detail),
        ].join("");
        renderNavChart(shadow.equity_curve || []);
        renderRebalanceHistory(shadow.rebalance_history || []);
      }

      function loadShadowPortfolio() {
        shadowStatus.textContent = "Building shadow portfolio";
        fetch("/api/shadow-portfolio?shadow_days=5")
          .then((response) => response.json())
          .then((payload) => {
            renderShadowPortfolio(payload.shadow_portfolio);
          })
          .catch(() => {
            shadowStatus.textContent = "Shadow portfolio unavailable";
            shadowSummary.innerHTML = "";
            shadowChart.innerHTML = "";
            rebalanceHistory.innerHTML =
              '<div class="error">Failed to load shadow portfolio.</div>';
          });
      }

      function renderNavChart(points) {
        if (!points.length) {
          shadowChart.innerHTML = "";
          return;
        }
        const width = 640;
        const height = 220;
        const pad = 24;
        const navs = points.map((point) => Number(point.nav || 1));
        const min = Math.min(...navs);
        const max = Math.max(...navs);
        const range = Math.max(max - min, 0.0001);
        const coords = points
          .map((point, index) => {
            const x = points.length === 1
              ? width / 2
              : pad + (index * (width - pad * 2)) / (points.length - 1);
            const y = height - pad - ((Number(point.nav || 1) - min) / range) * (height - pad * 2);
            return `${x.toFixed(1)},${y.toFixed(1)}`;
          })
          .join(" ");
        shadowChart.setAttribute("viewBox", `0 0 ${width} ${height}`);
        shadowChart.innerHTML = `
          <line class="chart-grid" x1="${pad}" y1="${pad}" x2="${width - pad}" y2="${pad}"></line>
          <line class="chart-grid" x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}"></line>
          <polyline points="${coords}"></polyline>
          <text x="${pad}" y="18" fill="#5f6b7a" font-size="12">${formatValue(max)}</text>
          <text x="${pad}" y="${height - 6}" fill="#5f6b7a" font-size="12">${formatValue(min)}</text>
        `;
      }

      function renderRebalanceHistory(history) {
        if (!history.length) {
          rebalanceHistory.innerHTML = '<div class="empty">No rebalance history yet.</div>';
          return;
        }
        rebalanceHistory.innerHTML = history
          .slice()
          .reverse()
          .map((item) => {
            const counts = item.signal_counts || {};
            const changes = item.changes || [];
            const title = [
              `Rebalance ${item.rebalance_date}, applied ${item.applied_date}`,
              `NAV ${formatValue(item.nav)} | exposure ${formatValue(item.target_exposure)}`,
              `Turnover ${formatValue(item.turnover)} | cost ${formatValue(item.cost)}`,
              `Portfolio return ${formatValue(item.portfolio_return)}`,
              `Signals B ${counts.BUY || 0} / H ${counts.HOLD || 0} / N ${counts.NO_TRADE || 0}`,
              changes.length
                ? changes.map((change) => `${change.code} ${formatValue(change.previous_weight)} -> ${formatValue(change.target_weight)}`).join("\n")
                : "No position changes",
            ].join("\n");
            return `
              <div class="history-item" title="${escapeAttr(title)}">
                <strong>${escapeHtml(item.applied_date)}</strong>
                <span>NAV ${formatValue(item.nav)} · Exp ${formatValue(item.target_exposure)}</span>
                <span>${changes.length} changes</span>
              </div>
            `;
          })
          .join("");
      }

      function percentValue(value) {
        if (value === null || value === undefined) return "-";
        return `${(Number(value) * 100).toFixed(2)}%`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function escapeAttr(value) {
        return escapeHtml(value)
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;")
          .replace(/\n/g, "&#10;");
      }
    </script>
  </body>
</html>
