<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyInvestPicking</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #5f6b7a;
        --line: #d8dee8;
        --accent: #0f766e;
        --buy: #047857;
        --hold: #92400e;
        --no-trade: #991b1b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(1360px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .status {
        color: var(--muted);
        font-size: 14px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .toolbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--line);
      }

      .toolbar h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
        letter-spacing: 0;
      }

      #summary {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
        max-width: 760px;
      }

      .summary-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 26px;
        padding: 0 9px;
        border: 1px solid #dbe4e1;
        border-radius: 6px;
        background: #f9fbfa;
        color: var(--text);
        cursor: help;
        font-size: 12px;
        font-weight: 650;
        white-space: nowrap;
      }

      .summary-pill span {
        color: var(--muted);
        font-weight: 600;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        background: #e8f3f1;
        color: var(--accent);
        font-size: 13px;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        min-width: 920px;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        padding: 13px 16px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        white-space: nowrap;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      td {
        font-size: 14px;
      }

      .compact-cell {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .score-cell {
        cursor: help;
      }

      .score-cell strong {
        display: block;
        font-weight: 700;
      }

      .score-cell span,
      .confidence span:first-child {
        color: var(--muted);
        font-size: 12px;
      }

      .signal {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 0 8px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 700;
      }

      .signal-buy {
        background: #dff5ea;
        color: var(--buy);
      }

      .signal-hold {
        background: #fff1d6;
        color: var(--hold);
      }

      .signal-no-trade {
        background: #fde2e2;
        color: var(--no-trade);
      }

      .confidence {
        display: grid;
        gap: 5px;
        min-width: 110px;
      }

      .confidence-track {
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: #e8edf5;
      }

      .confidence-fill {
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
      }

      .reason {
        cursor: help;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
      }

      td:nth-child(1),
      th:nth-child(1) {
        width: 112px;
      }

      td:nth-child(2),
      th:nth-child(2) {
        width: 150px;
      }

      td:nth-child(3),
      th:nth-child(3) {
        width: 92px;
      }

      td:nth-child(4),
      th:nth-child(4) {
        width: 96px;
      }

      td:nth-child(5),
      th:nth-child(5) {
        width: 104px;
      }

      td:nth-child(6),
      th:nth-child(6) {
        width: 128px;
      }

      td:nth-child(8),
      th:nth-child(8) {
        width: 120px;
      }

      td:nth-child(7),
      th:nth-child(7) {
        width: auto;
      }

      .empty,
      .error {
        padding: 32px;
        color: var(--muted);
        text-align: center;
      }

      .error {
        color: #b42318;
      }

      @media (max-width: 640px) {
        .page-header,
        .toolbar {
          align-items: flex-start;
          flex-direction: column;
        }

        #summary {
          justify-content: flex-start;
        }

        main {
          width: min(100% - 24px, 1040px);
          padding: 24px 0;
        }

        h1 {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <div data-myinvest-header></div>
    <main>
      <header class="page-header">
        <div>
          <h1>MyInvestPicking</h1>
          <div class="status">Next-day heavy-position stock picking workbench</div>
        </div>
        <div class="badge">Port 8019</div>
      </header>

      <section class="panel" aria-labelledby="top-picks-title">
        <div class="toolbar">
          <h2 id="top-picks-title">Today&apos;s Top Picks</h2>
          <div class="status" id="summary">Loading /api/picks</div>
        </div>
        <div class="table-wrap">
          <table aria-label="Stock picks">
            <thead>
              <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Weight</th>
                <th>Final</th>
                <th>Signal</th>
                <th>Confidence</th>
                <th>Reason</th>
                <th>Industry</th>
              </tr>
            </thead>
            <tbody id="picks">
              <tr>
                <td colspan="8" class="empty">No data yet. Engine not initialized.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <div data-myinvest-footer></div>
    <script src="https://invest.okbbc.com/header.js" data-target="[data-myinvest-header]" defer></script>
    <script src="https://invest.okbbc.com/footer.js" data-target="[data-myinvest-footer]" defer></script>
    <script>
      const picksBody = document.querySelector("#picks");
      const summary = document.querySelector("#summary");

      const formatValue = (value) => {
        if (value === null || value === undefined) return "-";
        return Number(value).toFixed(4);
      };

      fetch("/api/picks")
        .then((response) => response.json())
        .then((payload) => {
          const data = payload.portfolio || payload.data || [];
          const signals = payload.signals || data;
          const risk = payload.risk || {};
          const regime = payload.market_regime || {};
          const exposure = risk.portfolio_exposure ?? payload.risk_budget?.target_exposure ?? 0;
          const bjExposure = risk.exchange_exposure?.BJ ?? 0;
          const bjCap = risk.max_beijing_weight ?? payload.risk_budget?.max_beijing_weight ?? 0;
          const health = payload.factor_health?.factor_health_score ?? 0;
          const stability = payload.portfolio_stability?.stability_score ?? 0;
          const sharpe = payload.backtest?.metrics?.sharpe ?? 0;
          const signalCounts = payload.signal_summary?.counts || {};
          const buyCount = signalCounts.BUY ?? 0;
          const holdCount = signalCounts.HOLD ?? 0;
          const noTradeCount = signalCounts.NO_TRADE ?? 0;
          summary.title = [
            `BJ exposure ${formatValue(bjExposure)} / ${formatValue(bjCap)}`,
            `factor health ${formatValue(health)}`,
            `portfolio stability ${formatValue(stability)}`,
            `backtest sharpe ${formatValue(sharpe)}`,
            `${signals.length} signals`,
          ].join("\n");
          summary.innerHTML = [
            summaryPill("Date", payload.trading_date || payload.date, summary.title),
            summaryPill("Regime", regime.state || "range", summary.title),
            summaryPill("Exposure", formatValue(exposure), summary.title),
            summaryPill("Signals", `B ${buyCount} / H ${holdCount} / N ${noTradeCount}`, summary.title),
          ].join("");

          if (signals.length === 0) {
            picksBody.innerHTML =
              '<tr><td colspan="8" class="empty">No data yet. Engine not initialized.</td></tr>';
            return;
          }

          picksBody.innerHTML = signals
            .map(
              (pick) => `
                <tr>
                  <td class="compact-cell" title="${escapeAttr(codeDetail(pick))}">${escapeHtml(pick.code)}</td>
                  <td class="compact-cell" title="${escapeAttr(nameDetail(pick))}">${escapeHtml(pick.name || "-")}</td>
                  <td title="${escapeAttr(weightDetail(pick))}">${formatValue(pick.position_size ?? pick.weight)}</td>
                  <td class="score-cell" title="${escapeAttr(scoreDetail(pick))}">
                    <strong>${formatValue(pick.final_score)}</strong>
                    <span>base ${formatValue(pick.score)}</span>
                  </td>
                  <td title="${escapeAttr(decisionDetail(pick))}"><span class="signal ${signalClass(pick.action)}">${displayAction(pick.action)}</span></td>
                  <td title="${escapeAttr(confidenceDetail(pick))}">
                    <div class="confidence">
                      <span>${formatValue(pick.confidence)}</span>
                      <span class="confidence-track"><span class="confidence-fill" style="width: ${confidenceWidth(pick.confidence)}%"></span></span>
                    </div>
                  </td>
                  <td class="reason" title="${escapeAttr(decisionDetail(pick))}">${escapeHtml(reasonText(pick))}</td>
                  <td class="compact-cell" title="${escapeAttr(industryDetail(pick))}">${escapeHtml(pick.industry || "-")}</td>
                </tr>
              `,
            )
            .join("");
        })
        .catch(() => {
          summary.textContent = "API unavailable";
          picksBody.innerHTML =
            '<tr><td colspan="11" class="error">Failed to load picks.</td></tr>';
        });

      function signalClass(action) {
        if (action === "BUY") return "signal-buy";
        if (action === "HOLD") return "signal-hold";
        return "signal-no-trade";
      }

      function displayAction(action) {
        return action === "NO_TRADE" ? "NO TRADE" : action || "NO TRADE";
      }

      function confidenceWidth(value) {
        if (value === null || value === undefined) return 0;
        return Math.max(0, Math.min(100, Number(value) * 100));
      }

      function reasonText(signal) {
        const reason = signal.reason || {};
        const blocked = reason.tradability_reasons || [];
        if (blocked.length > 0) return blocked.join(", ");
        if (reason.backtest?.block_buy) {
          return `Backtest gate: Sharpe ${formatValue(reason.backtest.sharpe)}`;
        }
        const regime = reason.regime || "-";
        return `${displayAction(reason.decision || signal.action)} in ${regime}`;
      }

      function summaryPill(label, value, detail) {
        return `<span class="summary-pill" title="${escapeAttr(detail)}"><span>${escapeHtml(label)}</span>${escapeHtml(value ?? "-")}</span>`;
      }

      function codeDetail(signal) {
        const metrics = signal.metrics || {};
        return [
          `${signal.code} ${signal.name || ""}`,
          `close ${formatValue(metrics.close)} | pct ${formatValue(metrics.latest_pct_chg)}%`,
          `amount ${formatValue(metrics.latest_amount)} | turnover ${formatValue(metrics.turnover_rate)}%`,
        ].join("\n");
      }

      function nameDetail(signal) {
        return `${signal.name || "-"}\n${signal.code}\nIndustry: ${signal.industry || "-"}`;
      }

      function weightDetail(signal) {
        return [
          `Position size ${formatValue(signal.position_size ?? signal.weight)}`,
          `Original portfolio weight ${formatValue(signal.weight)}`,
        ].join("\n");
      }

      function scoreDetail(signal) {
        const factors = signal.factors || {};
        return [
          `Final ${formatValue(signal.final_score)} | base ${formatValue(signal.score)}`,
          `Momentum ${formatValue(factors.momentum)} | Quality ${formatValue(factors.quality)}`,
          `Value ${formatValue(factors.value)} | Risk ${formatValue(factors.risk)}`,
          `RiskAdj ${formatValue(signal.risk_adjust_factor)} | Regime ${formatValue(signal.regime_multiplier)}`,
          `Health ${formatValue(signal.factor_health_score)} | Exchange ${formatValue(signal.exchange_risk_multiplier)} | Liquidity ${formatValue(signal.liquidity_risk_multiplier)}`,
        ].join("\n");
      }

      function confidenceDetail(signal) {
        const components = signal.signal_confidence?.components || signal.reason?.confidence_components || {};
        return [
          `Confidence ${formatValue(signal.confidence)}`,
          `Factor consistency ${formatValue(components.factor_consistency)}`,
          `Regime alignment ${formatValue(components.regime_alignment)}`,
          `Volume confirmation ${formatValue(components.volume_confirmation)}`,
          `Timeframe alignment ${formatValue(components.timeframe_alignment)}`,
          `Factor health ${formatValue(components.factor_health)}`,
        ].join("\n");
      }

      function decisionDetail(signal) {
        const reason = signal.reason || {};
        const backtest = reason.backtest || {};
        const tradability = signal.tradability || {};
        const tradabilityText = tradability.tradable === false
          ? `Tradability blocked: ${(tradability.reasons || []).join(", ")}`
          : "Tradability ok";
        return [
          `Action ${displayAction(signal.action)}`,
          reasonText(signal),
          tradabilityText,
          `Regime ${reason.regime || "-"}`,
          `Backtest sharpe ${formatValue(backtest.sharpe)} | MDD ${formatValue(backtest.max_drawdown)}`,
          `Backtest block buy ${backtest.block_buy ? "yes" : "no"}`,
        ].join("\n");
      }

      function industryDetail(signal) {
        return `${signal.industry || "-"}\n${signal.code} ${signal.name || ""}`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function escapeAttr(value) {
        return escapeHtml(value)
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;")
          .replace(/\n/g, "&#10;");
      }
    </script>
  </body>
</html>
