<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyInvestPicking</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #5f6b7a;
        --line: #d8dee8;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(1280px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .status {
        color: var(--muted);
        font-size: 14px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--line);
      }

      .toolbar h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        background: #e8f3f1;
        color: var(--accent);
        font-size: 13px;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        padding: 13px 16px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        white-space: nowrap;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      td {
        font-size: 14px;
      }

      .factor-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(84px, 1fr));
        gap: 6px 10px;
        min-width: 180px;
      }

      .factor-chip {
        display: inline-flex;
        justify-content: space-between;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .factor-chip strong {
        color: var(--text);
        font-weight: 650;
      }

      td:nth-child(1),
      th:nth-child(1) {
        width: 120px;
      }

      td:nth-child(3),
      th:nth-child(3) {
        width: 96px;
      }

      td:nth-child(6),
      th:nth-child(6) {
        width: 220px;
      }

      td:nth-child(7),
      th:nth-child(7) {
        width: 210px;
      }

      .empty,
      .error {
        padding: 32px;
        color: var(--muted);
        text-align: center;
      }

      .error {
        color: #b42318;
      }

      @media (max-width: 640px) {
        header,
        .toolbar {
          align-items: flex-start;
          flex-direction: column;
        }

        main {
          width: min(100% - 24px, 1040px);
          padding: 24px 0;
        }

        h1 {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>MyInvestPicking</h1>
          <div class="status">Next-day heavy-position stock picking workbench</div>
        </div>
        <div class="badge">Port 8019</div>
      </header>

      <section class="panel" aria-labelledby="top-picks-title">
        <div class="toolbar">
          <h2 id="top-picks-title">Today&apos;s Top Picks</h2>
          <div class="status" id="summary">Loading /api/picks</div>
        </div>
        <div class="table-wrap">
          <table aria-label="Stock picks">
            <thead>
              <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Weight</th>
                <th>Final</th>
                <th>Score</th>
                <th>Factors</th>
                <th>Adjust</th>
                <th>Industry</th>
              </tr>
            </thead>
            <tbody id="picks">
              <tr>
                <td colspan="8" class="empty">No data yet. Engine not initialized.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <script>
      const picksBody = document.querySelector("#picks");
      const summary = document.querySelector("#summary");

      const formatValue = (value) => {
        if (value === null || value === undefined) return "-";
        return Number(value).toFixed(4);
      };

      fetch("/api/picks")
        .then((response) => response.json())
        .then((payload) => {
          const data = payload.portfolio || payload.data || [];
          const risk = payload.risk || {};
          const regime = payload.market_regime || {};
          const exposure = risk.portfolio_exposure ?? payload.risk_budget?.target_exposure ?? 0;
          const health = payload.factor_health?.factor_health_score ?? 0;
          const stability = payload.portfolio_stability?.stability_score ?? 0;
          const sharpe = payload.backtest?.metrics?.sharpe ?? 0;
          summary.textContent = `${payload.trading_date || payload.date} | ${regime.state || "range"} regime | exposure ${formatValue(exposure)} | health ${formatValue(health)} | stability ${formatValue(stability)} | sharpe ${formatValue(sharpe)} | ${data.length} positions`;

          if (data.length === 0) {
            picksBody.innerHTML =
              '<tr><td colspan="8" class="empty">No data yet. Engine not initialized.</td></tr>';
            return;
          }

          picksBody.innerHTML = data
            .map(
              (pick) => `
                <tr>
                  <td>${pick.code}</td>
                  <td>${pick.name || "-"}</td>
                  <td>${formatValue(pick.weight)}</td>
                  <td>${formatValue(pick.final_score)}</td>
                  <td>${formatValue(pick.score)}</td>
                  <td>
                    <div class="factor-list">
                      <span class="factor-chip">Mom <strong>${formatValue(pick.factors?.momentum)}</strong></span>
                      <span class="factor-chip">Qual <strong>${formatValue(pick.factors?.quality)}</strong></span>
                      <span class="factor-chip">Val <strong>${formatValue(pick.factors?.value)}</strong></span>
                      <span class="factor-chip">Risk <strong>${formatValue(pick.factors?.risk)}</strong></span>
                    </div>
                  </td>
                  <td>
                    <div class="factor-list">
                      <span class="factor-chip">RiskAdj <strong>${formatValue(pick.risk_adjust_factor)}</strong></span>
                      <span class="factor-chip">Regime <strong>${formatValue(pick.regime_multiplier)}</strong></span>
                      <span class="factor-chip">Health <strong>${formatValue(pick.factor_health_score)}</strong></span>
                    </div>
                  </td>
                  <td>${pick.industry || "-"}</td>
                </tr>
              `,
            )
            .join("");
        })
        .catch(() => {
          summary.textContent = "API unavailable";
          picksBody.innerHTML =
            '<tr><td colspan="8" class="error">Failed to load picks.</td></tr>';
        });
    </script>
  </body>
</html>
